services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: swiss_imports
      POSTGRES_USER: swiss_imports
      POSTGRES_PASSWORD: swiss_imports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: